<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Analyzer AI v8</title>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --accent: #007AFF; --text: #ffffff; --ai: #8E44AD; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: #2c2c2e; border: none; border-radius: 8px; color: white; padding: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--accent); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #chat-log { border-top: 1px solid #333; padding-top: 15px; margin-top: 15px; }
        .ai-msg { color: #d1b3ff; line-height: 1.6; background: #251b36; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .hidden { display: none; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
    </style>
</head>
<body>
    <div id="setup-page">
        <h3>API Setup</h3>
        <input type="password" id="api-key" placeholder="Gemini APIキーを入力">
        <button class="btn" onclick="saveKey()">保存して開始</button>
    </div>

    <div id="main-page" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">実戦データ入力</h3>
                <button onclick="resetKey()" style="background:none; color:#888; border:none; font-size:12px;">キー再設定</button>
            </div>
            
            <label>機種</label>
            <select id="machine"><option value="my_v">マイジャグラーV</option><option value="im_ex">アイムジャグラーEX</option></select>
            
            <div class="row">
                <div><label>総回転数</label><input type="number" id="totalG" placeholder="5000"></div>
                <div><label>BB回数</label><input type="number" id="big" placeholder="20"></div>
            </div>

            <label>REG内訳</label>
            <div class="row">
                <div><input type="number" id="s_reg" placeholder="単独"></div>
                <div><input type="number" id="c_reg" placeholder="チェリー"></div>
            </div>

            <div class="row">
                <div><label>ぶどう</label><input type="number" id="gp" placeholder="800"></div>
                <div><label>非重複チェリー</label><input type="number" id="cherry" placeholder="150"></div>
            </div>

            <label>現場の状況（AIが考慮します）</label>
            <textarea id="context" placeholder="例：特定日、並びで強い、角台が爆発中など" rows="3"></textarea>
            
            <button id="send-btn" class="btn" onclick="askAI()">AIに状況を相談する</button>
            <div id="chat-log"></div>
        </div>
    </div>

<script>
function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    if(key) { localStorage.setItem('gemini_key', key); location.reload(); }
}
function resetKey() { if(confirm("再設定しますか？")) { localStorage.removeItem('gemini_key'); location.reload(); } }
function init() { if(localStorage.getItem('gemini_key')) { document.getElementById('setup-page').classList.add('hidden'); document.getElementById('main-page').classList.remove('hidden'); } }

async function askAI() {
    const key = localStorage.getItem('gemini_key');
    const G = document.getElementById('totalG').value;
    const bb = document.getElementById('big').value || 0;
    const sr = document.getElementById('s_reg').value || 0;
    const cr = document.getElementById('c_reg').value || 0;
    const gp = document.getElementById('gp').value || 0;
    const ch = document.getElementById('cherry').value || 0;
    const ctx = document.getElementById('context').value;
    const btn = document.getElementById('send-btn');
    const log = document.getElementById('chat-log');

    if(!G) return alert("総回転数を入力してください");
    log.innerHTML = `<div style="color:#888; font-size:12px;">AIが思考中...</div>`;
    btn.disabled = true;

    // モデル名を最新の有効なものに修正
    const model = "gemini-1.5-flash-latest"; 
    const prompt = `あなたはパチスロ設定推測のプロです。以下のデータを元に、勝つための戦略をチャット形式で論評してください。
    【実機データ】機種:${document.getElementById('machine').value}, 回転数:${G}, BB:${bb}, 単独REG:${sr}, チェリーREG:${cr}, ぶどう:${gp}, チェリー:${ch}
    【現場の状況】${ctx}
    ※単独REGやぶどうの数値を重視し、現場の状況も含めて「続行」か「撤退」かハッキリした答えをください。`;

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        
        const text = data.candidates[0].content.parts[0].text;
        log.innerHTML = `<div class="ai-msg"><strong>AI解析レポート:</strong><br><br>${text.replace(/\n/g, '<br>')}</div>`;
    } catch (e) {
        log.innerHTML = `<div class="ai-msg" style="color:#ff3b30;"><strong>エラー:</strong><br>${e.message}</div>`;
    } finally {
        btn.disabled = false;
    }
}
init();
</script>
</body>
</html>
